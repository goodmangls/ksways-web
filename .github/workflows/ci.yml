name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test:run

  # linux 환경 next build — 필수 게이트 (실험 job 3연속 PASS 후 승격, 2026-07-12).
  # 로컬 macOS build 실패(/_global-error prerender)는 이 게이트와 무관한 darwin 한정 framework debt
  # (docs/archive/2026-07/node24-build-fix, ksways-ci-hardening 참조).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
