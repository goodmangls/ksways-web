<svg width="1120" height="920" viewBox="0 0 1120 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KS WAYS ocean and air freight logistics visualization</title>
  <desc id="desc">A premium KS WAYS hero illustration showing an ocean freight vessel, air cargo aircraft, containers, Northeast Asia route lines, and shipment tracking panels.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="64%">
      <stop offset="0%" stop-color="#21D4C2" stop-opacity="0.36"/>
      <stop offset="42%" stop-color="#2D8CFF" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="#001112" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="92" y1="644" x2="1012" y2="808" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06383D"/>
      <stop offset="0.48" stop-color="#075A61"/>
      <stop offset="1" stop-color="#0A2D44"/>
    </linearGradient>
    <linearGradient id="cyanBlue" x1="142" y1="142" x2="978" y2="766" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6FFFE7"/>
      <stop offset="0.52" stop-color="#21D4C2"/>
      <stop offset="1" stop-color="#2D8CFF"/>
    </linearGradient>
    <linearGradient id="shipHull" x1="238" y1="560" x2="866" y2="704" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FFFF"/>
      <stop offset="0.58" stop-color="#C9F6F0"/>
      <stop offset="1" stop-color="#8FD5E9"/>
    </linearGradient>
    <linearGradient id="planeBody" x1="654" y1="220" x2="958" y2="352" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#C9FBF3"/>
      <stop offset="1" stop-color="#7CB6FF"/>
    </linearGradient>
    <filter id="softShadow" x="58" y="60" width="1010" height="806" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="42" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#FFFFFF" stroke-opacity="0.052" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:.16em}
      .label{font-family:Inter,Arial,sans-serif;font-weight:900;letter-spacing:.06em}
      .small{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:.11em}
    </style>
  </defs>

  <rect width="1120" height="920" rx="58" fill="#001112"/>
  <rect width="1120" height="920" rx="58" fill="url(#bgGlow)"/>
  <rect x="38" y="38" width="1044" height="844" rx="54" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <rect x="38" y="38" width="1044" height="844" rx="54" fill="url(#grid)" opacity="0.52"/>

