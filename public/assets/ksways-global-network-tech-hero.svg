    <rect x="26" y="24" width="208" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.07"/>
    <text x="130" y="52" text-anchor="middle" fill="#6FFFE7" class="mono" font-size="15">NETWORK OPS</text>
    <text x="130" y="116" text-anchor="middle" fill="#FFFFFF" class="label" font-size="34">KS WAYS</text>
    <text x="130" y="147" text-anchor="middle" fill="#FFFFFF" opacity="0.62" class="small" font-size="13">OCEAN · AIR · PARTNER</text>
    <path d="M56 178H204" stroke="url(#cyanBlue)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="56" cy="178" r="9" fill="#6FFFE7"/>
    <circle cx="130" cy="178" r="9" fill="#21D4C2"/>
    <circle cx="204" cy="178" r="9" fill="#2D8CFF"/>
  </g>

  <g transform="translate(126 160)">
    <rect width="236" height="98" rx="26" fill="#FFFFFF" fill-opacity="0.085" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="28" y="38" fill="#6FFFE7" class="mono" font-size="13">GLOBAL NETWORK</text>
    <text x="28" y="70" fill="#FFFFFF" class="label" font-size="22">WCA Partner Routes</text>
  </g>

  <g transform="translate(754 704)">
    <rect width="238" height="100" rx="26" fill="#FFFFFF" fill-opacity="0.085" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="28" y="38" fill="#6FFFE7" class="mono" font-size="13">TECH ENABLED</text>
    <text x="28" y="70" fill="#FFFFFF" class="label" font-size="22">Data-led Handoffs</text>
  </g>

  <g transform="translate(770 142)">
    <path d="M0 52C74 26 128 26 204 52" stroke="#FFFFFF" stroke-opacity="0.38" stroke-width="2" stroke-linecap="round"/>
    <path d="M72 18L118 52L72 86L84 56H0V48H84L72 18Z" fill="#6FFFE7"/>
    <text x="116" y="110" text-anchor="middle" fill="#FFFFFF" opacity="0.62" class="mono" font-size="12">AIR CORRIDOR</text>
  </g>

  <g transform="translate(132 698)" opacity="0.92">
    <path d="M0 54H214" stroke="#FFFFFF" stroke-opacity="0.32" stroke-width="2"/>
    <path d="M28 24H178L204 54H0L28 24Z" fill="#21D4C2" fill-opacity="0.22" stroke="#6FFFE7" stroke-opacity="0.52"/>
    <rect x="46" y="34" width="34" height="20" rx="4" fill="#6FFFE7" fill-opacity="0.74"/>
    <rect x="90" y="34" width="34" height="20" rx="4" fill="#2D8CFF" fill-opacity="0.64"/>
    <rect x="134" y="34" width="34" height="20" rx="4" fill="#FFFFFF" fill-opacity="0.32"/>
    <text x="107" y="84" text-anchor="middle" fill="#FFFFFF" opacity="0.62" class="mono" font-size="12">OCEAN FREIGHT</text>
  </g>

  <g opacity="0.44">
    <path d="M96 96L226 96" stroke="#6FFFE7" stroke-width="8" stroke-linecap="round"/>
    <path d="M96 120L174 120" stroke="#2D8CFF" stroke-width="8" stroke-linecap="round"/>
    <path d="M894 842L1018 842" stroke="#6FFFE7" stroke-width="8" stroke-linecap="round"/>
    <path d="M944 816L1018 816" stroke="#2D8CFF" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
