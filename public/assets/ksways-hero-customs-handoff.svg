  </g>
  <g filter="url(#shadow)"><circle cx="188" cy="614" r="12" fill="#6FFFE7"/><circle cx="560" cy="464" r="12" fill="#21D4C2"/><circle cx="868" cy="296" r="12" fill="#2D8CFF"/><circle cx="958" cy="610" r="10" fill="#6FFFE7"/></g>
