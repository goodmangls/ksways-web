    <text x="44" y="116" fill="#001112" class="label" font-size="34">CUSTOMS</text>
    <text x="44" y="156" fill="#001112" opacity=".62" class="small" font-size="15">DOCUMENT REVIEW</text>
    <g fill="#001112" opacity=".16"><rect x="44" y="214" width="300" height="14" rx="7"/><rect x="44" y="252" width="250" height="14" rx="7"/><rect x="44" y="290" width="310" height="14" rx="7"/><rect x="44" y="328" width="218" height="14" rx="7"/></g>
    <rect x="44" y="386" width="140" height="54" rx="27" fill="#21D4C2"/><text x="114" y="420" text-anchor="middle" fill="#001112" class="mono" font-size="13">CLEARED</text>
    <path d="M280 384L338 430L300 462" stroke="#2D8CFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
