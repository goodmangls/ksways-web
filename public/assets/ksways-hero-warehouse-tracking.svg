<svg width="1120" height="920" viewBox="0 0 1120 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KS WAYS warehouse and shipment tracking logistics visualization</title>
  <desc id="desc">A premium logistics image showing warehouse handling, container doors, barcode scanning, shipment tracking, and route control panels.</desc>
  <defs>
