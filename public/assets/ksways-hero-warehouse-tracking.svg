    <linearGradient id="cyanBlue" x1="100" y1="126" x2="1010" y2="812" gradientUnits="userSpaceOnUse"><stop stop-color="#6FFFE7"/><stop offset=".52" stop-color="#21D4C2"/><stop offset="1" stop-color="#2D8CFF"/></linearGradient>
